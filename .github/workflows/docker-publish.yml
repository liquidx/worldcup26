name: Publish Docker images

# Manual button (workflow_dispatch) + automatic on version tags (vX.Y.Z).
# Deliberately NOT on push-to-main: update-data.yml commits to main every ~15 min
# during the tournament, and the images carry no data, so that would be pure waste.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 26worldcup            # web (nginx serving the PWA)
            target: serve
          - image: 26worldcup-updater    # self-mode data pipeline sidecar
            target: updater
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3      # enables linux/arm64 emulation

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false                    # cleaner multi-arch manifest, widest compatibility
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
