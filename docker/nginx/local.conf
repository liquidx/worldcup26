# DATA_SOURCE=bundled|self: app shell and /data/ both served from local files.
#   bundled = the data snapshot baked into the image at build time
#   self    = an updater sidecar writes fresh JSON into a volume mounted at
#             /usr/share/nginx/html/data (see docker-compose.self.yml)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/snippets/common.conf;

    location /data/ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
