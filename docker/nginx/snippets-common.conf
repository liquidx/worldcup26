# Shared by every DATA_SOURCE mode (included inside the server block).
# Note: we use add_header (not `expires`) for caching so each response carries a
# single Cache-Control header (combining the two would emit duplicates).

gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json application/wasm;

# content-hashed build assets -> cache forever
location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# static art shipped with the build -> cache a month
location /flags/ { add_header Cache-Control "public, max-age=2592000"; }
location /icons/ { add_header Cache-Control "public, max-age=2592000"; }

# app shell + PWA control files must always revalidate so updates roll out
location = /index.html           { add_header Cache-Control "no-cache"; }
location = /sw.js                { add_header Cache-Control "no-cache"; }
location = /registerSW.js        { add_header Cache-Control "no-cache"; }
location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

# SPA fallback (HashRouter doesn't strictly need it, but it's harmless + future-proof)
location / {
    try_files $uri $uri/ /index.html;
}
